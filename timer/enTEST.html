<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Damien's Official Screensaver&copy;</title>

<!-- Integrated System Component Styling -->
<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
    overflow: hidden;
}
.container {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 50%;
    padding: 50px;
}
.clock {
    font-size: 90px;
    font-weight: 600;
    text-align: center;
}
.top-bar {
    display: flex;
    justify-content: space-between;
    font-size: 40px;
}
.blocker {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: white;
    color: black;
    font-weight: 900;
    font-size: 150px;
    text-align: center;
    z-index: 10000;
    transition: opacity 4s ease-in-out;
}
#status {
    text-align: left;
    font-size: 30px;
    width: 220px;
    position: fixed;
    top: 100px;
}
</style>

<!-- Background Component Styling -->
<style>
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    transition: opacity 4s ease-in-out;
    z-index: -1;
}
</style>

<!-- Battery Component Styling -->
<style>
#battery {
    z-index: 1000;
    font-weight: bold;
    transition: color 1s ease-in-out;
}
#o {
    font-size: 40px;
    font-weight: 900;
    position: fixed;
    right: 48.5px;
    transition: color 1s ease-in-out;
}
</style>
</head>
<body>

<div class="blocker" id="A"><br>Click to start!</div>

<!-- Background Canvas Layers -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="container">
    <div class="top-bar">
        <div id="weather">Weather: Loading...</div>
        <div id="o" style="font-weight: 900;">Battery: --%</div>
        <div id="battery">Battery: --%</div>
    </div>

    <div class="clock" id="notClock" style="font-size: 45px;">Toggle Modes</div>
    <div class="clock" id="clock">00:00:00</div>
    <div class="clock" id="date">Date</div>
    <div class="clock" id="full" style="font-size: 30px;">Toggle Fullscreen</div>
    <div class="clock" id="links" style="font-size: 30px;">Links</div>
    <div class="clock" id="status"></div>
</div>

<!-- Load Modular Script Packages from /root/tools/ -->
<script src="../tools/background.js"></script>
<script src="../tools/clock.js"></script>
<script src="../tools/weather.js"></script>
<script src="../tools/battery.js"></script>

<!-- Global Master Window Configuration Logic -->
<script>
function updateOnlineStatus() {
    const statusElement = document.getElementById("status");
    statusElement.innerHTML = navigator.onLine ? "Internet Status: Online" : "Internet Status: Offline";
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
window.onload = updateOnlineStatus;
setInterval(updateOnlineStatus, 1000);

notClock.onclick = () => {
    window.location.href = 'file:///home/chronos/u-c4e7e83e5ef3697176f1df9839e5497577cd93bf/MyFiles/Coding/ai.html';
};

function launchScreensaver() {
    if (confirm(`This is the first screensaver that Damien has coded.\n\nThis site will reload when you close your computer.\n\nThis site is NOT meant to be used at page size 200 or higher, and is intended to be used at page size 125%, or 100%.\n\nWith these precautions, do you still wish to continue?`)) {
        alert('Welcome to the screensaver!');
        document.getElementById('A').remove();
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        }
    }
}

A.onclick = launchScreensaver;

document.addEventListener('keydown', (event) => {
    if (event.key === "Enter") launchScreensaver();
    if (event.key === "a") {
        window.open('google.com', 'newwindow', 'width=1518px,height=853px');
    }
    if (event.key === "c") {
        window.open('google.com', 'newwindow', 'width=1518px,height=853px');
    }
    if (event.key === "l") {
        let link = prompt('Search', 'https://');
        if (link) handleBloxdRouting(link);
    }
    if (event.key === "b") {
        if (confirm('Play Bloxd.io?')) handleBloxdRouting('https://bloxd.io');
    }
});

function handleBloxdRouting(link) {
    if (link === 'https://bloxd.io') {
        if (confirm("Damien's Account (thenewkid1234), or Darren's account(newcomer_)? 'OK' is Damien's account, and 'Cancel' is Darren's account.")) {
            window.open('https://bloxd.io', 'newwindow', 'width=1518px,height=853px');
        } else {
            window.open('file:///home/chronos/u-c4e7e83e5ef3697176f1df9839e5497577cd93bf/MyFiles/Coding/bloxd.html', 'newwindow', 'width=1518px,height=853px');
        }
    } else {
        window.open(link, 'newwindow', 'width=1518px,height=853px');
    }
}

links.onclick = () => {
    window.location.href = 'file:///home/chronos/u-c4e7e83e5ef3697176f1df9839e5497577cd93bf/MyFiles/Coding/Screensaver/screensaverlinks.html';
};

full.onclick = () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
};
</script>
</body>
</html>
