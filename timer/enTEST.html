
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Damien's Official Screensaver&copy;</title>
<link rel="icon" href="/../favicon.png">
<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
    overflow: hidden;
    white-space: nowrap;
}
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    transition: opacity 4s ease-in-out;
    z-index: -1;
}
.container {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 50%;
    padding: 50px;
    width: 100%;
}
.clock {
    font-size: 90px;
    font-weight: 600;
    text-align: center;
}
.iclock {
    font-size: 90px;
    font-weight: 600;
    text-align: center;
}
.top-bar {
    display: flex;
    justify-content: space-between;
    font-size: 40px;
    width: 90%;
}
.blocker {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-color:white;
    color:black;
    font-weight: 900;
    font-size: 150px;
    text-align: center;
    z-index: 10000;
    transition: opacity 4s ease-in-out;
}
#status {
    text-align: left;
    font-size: 30px;
    width: 220px;
    position: fixed;
    top: 100px;
}
#status1 {
    text-align: left;
    font-size: 30px;
    width: 220px;
    position: fixed;
    top: 200px;
}
#o {
    font-size: 40px;
    font-weight: 900;
}
.bottom-bar {
    bottom: 0;
    justify-content: space-between;
    height: 100px;
    white-space: nowrap;
    width: 100%;
    padding: 10px;
    display: flex;
    flex-direction: row;
    padding: 5px;
    text-align: center;
}
.settings {
    width: 9%;
    display: inline-block;
}
ispan {
    font-size: 62px;
    font-weight: 600;
}
h3 {
    /*padding-top: 25px;*/
    font-size: 100px;
    font-weight: bolder;
}
</style>
<!-- <script> Below is the Internet status -->
<script>
    // Function to update the status display
    function updateOnlineStatus(event) {
        var statusElement = document.getElementById("status");
        if (navigator.onLine) {
            statusElement.innerHTML = "Internet Status: Online";
        } else {
            statusElement.innerHTML = "Internet Status: Offline";
        }
    }
    
    // Add event listeners for online and offline events
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // Initial check when the page loads
    window.onload = updateOnlineStatus;
    setInterval(updateOnlineStatus, 1000)
</script>
</head>
<body>
